databases:
  - name: stock-analyst-db
    databaseName: stock_analyst
    plan: free

services:
  - type: web
    name: stock-analyst-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python seed_users.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stock-analyst-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://stock-analyst-ui.onrender.com

  - type: web
    name: stock-analyst-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://stock-analyst-api.onrender.com
